name = "papa-check-dashboard"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# Variables non-sensibles versionnées dans wrangler.toml pour qu'elles
# survivent aux re-déploiements (les variables "plain text" ajoutées dans
# la UI Cloudflare disparaissent lors des nouveaux deploys). Le seul vrai
# secret (CLERK_SECRET_KEY) reste géré via la UI Cloudflare.
[vars]
ALLOWED_EMAILS = "michel.mibou@gmail.com,ludovic.bourgoin@gmail.com,ludo@coolbeans.cc"

# Binding sur la même D1 que le Worker.
[[d1_databases]]
binding = "DB"
database_name = "papa-check"
database_id = "cd14815d-001a-4765-986e-4952c2be09b2"

# Les secrets Clerk + l'allowlist se configurent dans le dashboard Cloudflare Pages :
# - PUBLIC_CLERK_PUBLISHABLE_KEY (variable d'environnement standard)
# - CLERK_SECRET_KEY (variable d'environnement marquée comme secret)
